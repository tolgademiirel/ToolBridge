name: ToolBridge .NET Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Restore and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\ToolBridge.sln

      - name: Build
        run: dotnet build .\ToolBridge.sln --configuration Release --no-restore

      - name: Lite publish smoke test
        shell: pwsh
        run: .\publish.ps1 -Runtime win-x64 -Lite -SkipExternalTools -NoStrictToolCheck
